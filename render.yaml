# FX Scalp Agent — окремий Render акаунт (API + Static panel)
# Blueprint: branch fx-scalp-agent, файл render.yaml у корені

envVarGroups:
  - name: fx-scalp-shared
    envVars:
      - key: FX_API_SECRET
        generateValue: true

services:
  - type: web
    name: fx-scalp-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node api/server.js
    healthCheckPath: /health
    envVars:
      - fromGroup: fx-scalp-shared
      - key: FX_AUTO_START_WORKER
        value: "1"
      - key: FX_STATE_FILE
        value: "1"
      - key: FX_PROFIT_BOOST
        value: "1"
      - key: FX_SIMULATE
        value: "1"
      - key: FX_EXECUTOR
        value: capital
      - key: FX_DATA_PROVIDER
        value: capital
      # Real-time bid/ask + OHLC via Capital WebSocket (до 40 пар, без REST quote rotation)
      - key: FX_CAPITAL_USE_WEBSOCKET
        value: "1"
      # OANDA paper — заповни TOKEN + ACCOUNT у Render, потім зміни FX_EXECUTOR=oanda
      - key: FX_OANDA_ENV
        value: practice
      - key: FX_OANDA_TOKEN
        sync: false
      - key: FX_OANDA_ACCOUNT
        sync: false
      # Capital.com paper (demo, доступно в Україні) — заповни 3 секрети у Render,
      # увімкни 2FA і згенеруй API key, далі FX_EXECUTOR=capital
      - key: FX_CAPITAL_ENV
        value: demo
      - key: FX_CAPITAL_API_KEY
        sync: false
      - key: FX_CAPITAL_IDENTIFIER
        sync: false
      - key: FX_CAPITAL_PASSWORD
        sync: false
      - key: FX_SIGNAL_ENGINE
        value: charlie
      - key: FX_PAIRS
        value: EURUSD,GBPUSD,USDJPY,AUDUSD,GBPJPY,EURJPY,AUDJPY,GBPAUD,EURAUD,GBPCHF,EURGBP,USDCAD
      - key: FX_CHARLIE_STOP_PIPS
        value: "4.5"
      - key: FX_CHARLIE_TARGET_MIN
        value: "10"
      - key: FX_CHARLIE_TARGET_MAX
        value: "28"
      - key: FX_CHARLIE_MAX_PAIRS
        value: "4"
