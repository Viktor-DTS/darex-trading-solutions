      name: fx-scalp-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  - type: web
    name: fx-scalp-panel
    runtime: static
    buildCommand: npm install && node scripts/build-panel-config.js
    staticPublishPath: ./dashboard
    envVars:
