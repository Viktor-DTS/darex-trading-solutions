name: dts_mobile
description: DTS mobile app (Flutter) for service, warehouse, testing, and manager panels.
publish_to: "none"
version: 0.3.2+5

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  permission_handler: ^11.3.1
  flutter_secure_storage: ^10.0.0
  image_picker: ^1.2.1
  mobile_scanner: ^6.0.2
  url_launcher: ^6.3.2
  package_info_plus: ^8.1.2
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
