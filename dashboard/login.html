<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FX Scalp Agent — Вхід</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./login.css" />
</head>
<body class="login-page">
  <main class="login-card">
    <h1>FX Scalp Agent</h1>
    <p class="login-sub">Захищена панель. Увійдіть, щоб переглядати дані бота.</p>
    <form id="loginForm">
      <label>
        Логін
        <input id="loginUser" name="user" autocomplete="username" required />
      </label>
      <label>
        Пароль
        <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
      </label>
      <p id="loginError" class="login-error hidden"></p>
      <button type="submit" class="primary login-submit">Увійти</button>
    </form>
  </main>
  <script src="./config.js"></script>
  <script src="./auth.js"></script>
  <script src="./login.js"></script>
</body>
</html>
